<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大心整合行銷 — AI 行銷管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17140f;          /* 表格／提示等深色區塊 */
  --ink-2:#24201a;
  --gold:#c9974a;         /* 主金 */
  --gold-deep:#a87830;
  --cream:#f7f1e3;        /* 卡片米 */
  --cream-2:#efe6d2;
  --paper:#fdfbf6;        /* 內容底 */
  --line:#e3d9c4;
  --text:#2b2620;
  --muted:#8a8072;
  --green:#3e7d5a; --green-bg:#dcebe0;
  --yellow:#a07816; --yellow-bg:#f5e8c4;
  --blue:#3d6b8e;  --blue-bg:#dbe7f0;
  --red:#b04a3a;   --red-bg:#f3ddd7;
  --pink:#b0447a;  --pink-bg:#f3dce8;
  --gray:#6b6b6b;  --gray-bg:#e7e4de;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--text);display:flex;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;width:100%;color:var(--text)}
textarea{resize:vertical;min-height:80px}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}

/* ---------- 側欄 ---------- */
.sidebar{width:210px;background:#D81B72;color:#e9e2d4;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{font-family:'Noto Serif TC',serif;font-size:21px;font-weight:900;padding:26px 22px 20px;letter-spacing:1px;border-bottom:1px solid #B8145F}
.nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:10px;padding:11px 14px;color:#f6d3e6;text-decoration:none;font-size:14.5px;border-radius:8px;margin-bottom:2px}
.nav a .ic{width:16px;text-align:center;opacity:.7;font-size:12px}
.nav a:hover{background:#B8145F;color:#fff}
.nav a.active{background:#A01050;color:#fff;font-weight:700;box-shadow:inset 3px 0 0 var(--gold)}
.mode-tag{margin:12px;padding:8px 10px;font-size:11.5px;border-radius:8px;background:#B8145F;color:#f3c8de;line-height:1.5}
.mode-tag b{color:var(--gold)}

/* ---------- 主區 ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:#D81B72;color:#fff;display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:3px solid var(--gold)}
.topbar .num{background:var(--gold);color:var(--ink);font-weight:900;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
.topbar h2{font-size:18px;font-weight:700}
.topbar .sub{margin-left:auto;font-size:13px;color:var(--gold);font-weight:500}
.content{padding:28px 30px;max-width:1180px}
.page-title{font-family:'Noto Serif TC',serif;font-size:34px;font-weight:900;margin-bottom:6px}
.page-desc{color:var(--muted);font-size:14px;margin-bottom:22px;line-height:1.6}

/* ---------- 統計卡 ---------- */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:22px}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.stat .label{font-size:13px;color:var(--muted);margin-bottom:6px}
.stat .val{font-size:27px;font-weight:900}
.stat .note{font-size:12px;margin-top:4px}
.stat .bubble{position:absolute;right:-14px;bottom:-18px;width:64px;height:64px;border-radius:50%;opacity:.55}
.n-green{color:var(--green)} .n-red{color:var(--red)} .n-blue{color:var(--blue)} .n-gold{color:var(--gold-deep)}
.b-green{background:#bcd8c6} .b-cream{background:#e8d9b5} .b-red{background:#ecc4bb} .b-blue{background:#c3d5e4}

/* ---------- 面板 ---------- */
.panel{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:20px}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.panel-head h3{font-size:15.5px;font-weight:700}
.panel-head .hint{font-size:12.5px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px}
.btn{background:var(--gold);color:var(--ink);border:none;border-radius:9px;padding:11px 20px;font-weight:700;font-size:14px}
.btn:hover{background:var(--gold-deep);color:#fff}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
.btn.small{padding:6px 12px;font-size:12.5px}

/* ---------- 狀態籤 ---------- */
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap}
.st-草稿中{background:var(--red-bg);color:var(--red)}
.st-待補資料{background:var(--yellow-bg);color:var(--yellow)}
.st-待客戶審核{background:var(--blue-bg);color:var(--blue)}
.st-已發布{background:var(--green-bg);color:var(--green)}
.st-緊急處理{background:var(--pink-bg);color:var(--pink)}
.st-延後發布{background:var(--gray-bg);color:var(--gray)}
.tagline{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{background:var(--cream-2);border:1px solid var(--line);border-radius:14px;padding:2px 10px;font-size:11.5px}

/* ---------- 表格 ---------- */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:13.5px}
thead{background:var(--ink);color:#e9e2d4}
th{padding:10px 12px;text-align:left;font-size:12.5px;font-weight:500}
td{padding:11px 12px;border-bottom:1px solid #f0ead9;vertical-align:top}
td .sub{font-size:12px;color:var(--muted);margin-top:3px}

/* ---------- 品牌卡 ---------- */
.brand-card{background:#fff;border:2px solid transparent;border-radius:12px;padding:14px 16px;margin-bottom:12px;cursor:pointer}
.brand-card.sel{border-color:var(--green)}
.brand-card .row{display:flex;align-items:center;gap:10px}
.brand-card .avatar{width:32px;height:32px;border-radius:8px;color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center}
.brand-card .pct{margin-left:auto;font-weight:900;font-size:14px}
.brand-card .bar{height:6px;border-radius:4px;background:#eee;margin-top:9px;overflow:hidden}
.brand-card .bar i{display:block;height:100%}
.info-card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px 16px}
.info-card h4{font-size:13.5px;margin-bottom:7px}
.info-card p{font-size:12.5px;color:#5a5347;line-height:1.7}

/* ---------- 看板 ---------- */
.kanban{display:grid;grid-template-columns:repeat(6,minmax(160px,1fr));gap:12px;overflow-x:auto}
.kcol{background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px}
.kcol h4{font-size:13px;display:flex;justify-content:space-between;margin-bottom:10px;padding:0 4px}
.kcard{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:9px;font-size:12.5px}
.kcard b{display:block;font-size:13px;margin-bottom:4px}
.kcard .meta{color:var(--muted);font-size:11.5px;line-height:1.5}
.kempty{border:1.5px dashed var(--line);border-radius:9px;padding:22px 0;text-align:center;color:var(--muted);font-size:12.5px}

/* ---------- 月曆 ---------- */
.cal-head{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.cal-head .mbtn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 14px;font-size:13px}
.cal-head .mbtn.on{background:var(--ink);color:#fff}
.legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.cal-cell{background:#fff;min-height:96px;padding:6px;font-size:12px}
.cal-cell .d{font-weight:700;color:var(--muted);margin-bottom:4px}
.cal-ev{border-radius:7px;padding:5px 7px;margin-bottom:5px;font-size:11px;line-height:1.45;border-left:3px solid}
.ev-已發布{background:var(--green-bg);border-color:var(--green)}
.ev-待補資料{background:var(--yellow-bg);border-color:var(--yellow)}
.ev-待客戶審核{background:var(--blue-bg);border-color:var(--blue)}
.ev-草稿中{background:var(--red-bg);border-color:var(--red)}
.ev-緊急處理{background:var(--pink-bg);border-color:var(--pink)}
.ev-延後發布{background:var(--gray-bg);border-color:var(--gray)}

/* ---------- 產出結果 ---------- */
.gen-out{background:#fff;border:1px solid var(--line);border-radius:11px;padding:18px;min-height:340px;font-size:13.5px;line-height:1.85;white-space:pre-wrap}
.gen-out.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center}
.step-flow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.step{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}
.step .no{background:var(--gold);color:var(--ink);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;margin-bottom:7px}
.step b{font-size:13px;display:block;margin-bottom:4px}
.step p{font-size:11.5px;color:var(--muted);line-height:1.5}
.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:.3s;pointer-events:none;border-left:4px solid var(--gold)}
.toast.show{opacity:1}

/* ---------- 登入閘門與確認視窗 ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(20,17,12,.72);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--paper);border-radius:16px;padding:28px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.modal h3{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:900;margin-bottom:6px}
.modal .desc{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6}
.modal .field{margin-bottom:12px}
.modal .err{color:var(--red);font-size:12.5px;margin-bottom:10px;min-height:16px}
.modal .row{display:flex;gap:10px;margin-top:6px}
.modal .row .btn{flex:1}
.btn.danger{background:var(--red);color:#fff}
.btn.danger:hover{background:#8f3a2d}
.auth-tabs{display:flex;gap:6px;margin-bottom:16px}
.auth-tabs button{flex:1;padding:9px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:14px;font-weight:700}
.auth-tabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.side-actions{padding:0 12px 14px;display:flex;flex-direction:column;gap:6px}
.side-actions button{background:#B8145F;border:1px solid #C0165F;color:#f3c8de;border-radius:8px;padding:8px;font-size:12.5px}
.side-actions button:hover{color:#fff;border-color:var(--gold)}
.del-x{background:none;border:none;color:var(--red);font-size:13px;padding:2px 6px;border-radius:6px}
.del-x:hover{background:var(--red-bg)}

@media (max-width:900px){
  .sidebar{width:64px}
  .brand{font-size:0;padding:20px 0;text-align:center}
  .brand::after{content:"大心";font-size:16px}
  .nav a span.txt{display:none}
  .mode-tag{display:none}
  .grid2,.grid3,.grid4,.step-flow{grid-template-columns:1fr}
  .kanban{grid-template-columns:repeat(2,1fr)}
  .content{padding:18px}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">大心整合行銷</div>
  <nav class="nav" id="nav"></nav>
  <div class="side-actions">
    <button onclick="downloadBackup()">⬇ 下載完整備份</button>
    <button onclick="doLogout()" id="logoutBtn">登出</button>
  </div>
  <div class="mode-tag" id="modeTag"></div>
</aside>

<div class="main">
  <div class="topbar">
    <div class="num" id="tbNum">1</div>
    <h2 id="tbTitle">總覽</h2>
    <div class="sub" id="tbSub"></div>
  </div>
  <div class="content" id="app"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 登入 / 註冊閘門 -->
<div class="modal-bg" id="authGate">
  <div class="modal">
    <h3>大心整合行銷</h3>
    <p class="desc" id="authDesc">請登入以進入系統。</p>
    <div class="auth-tabs">
      <button id="tabLogin" class="on" onclick="authTab('login')">登入</button>
      <button id="tabReg" onclick="authTab('register')">註冊</button>
    </div>
    <div id="regEmailWrap" class="field" style="display:none"><label style="display:block;font-size:12.5px;font-weight:700;margin-bottom:5px">Email 信箱</label><input id="au_email" type="email" placeholder="name@example.com"></div>
    <div class="field"><label style="display:block;font-size:12.5px;font-weight:700;margin-bottom:5px">帳號</label><input id="au_user" placeholder="至少 3 個字元"></div>
    <div class="field"><label style="display:block;font-size:12.5px;font-weight:700;margin-bottom:5px">密碼</label><input id="au_pass" type="password" placeholder="至少 8 個字元">
      <div style="text-align:right;margin-top:5px"><a href="javascript:void(0)" onclick="toggleForgot()" style="font-size:12px;color:var(--gold-deep)">忘記密碼？</a></div>
    </div>
    <div id="forgotWrap" style="display:none;background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px">
      <p style="font-size:12.5px;margin-bottom:8px;line-height:1.6">輸入你的帳號或 Email，系統會通知總管理員。管理員重設完成後，會以 Email 通知你新密碼。</p>
      <input id="fg_id" placeholder="帳號或 Email" style="margin-bottom:8px">
      <button class="btn small" onclick="submitForgot()">送出重設申請</button>
      <div id="fg_msg" style="font-size:12px;color:var(--green);margin-top:8px"></div>
    </div>
    <div id="regCodeWrap" class="field" style="display:none"><label style="display:block;font-size:12.5px;font-weight:700;margin-bottom:5px">邀請碼（管理者有設定才需填）</label><input id="au_code" placeholder="選填"></div>
    <div class="err" id="authErr"></div>
    <div class="row">
      <button class="btn" id="authBtn" onclick="submitAuth()">登入</button>
      <button class="btn ghost" id="guestBtn" onclick="guestEnter()" style="display:none">以訪客瀏覽（Demo）</button>
    </div>
  </div>
</div>

<!-- 刪除確認：需帳號密碼 -->
<div class="modal-bg" id="delModal">
  <div class="modal">
    <h3>確認刪除</h3>
    <p class="desc" id="delDesc"></p>
    <div class="field"><label style="display:block;font-size:12.5px;font-weight:700;margin-bottom:5px">帳號</label><input id="del_user"></div>
    <div class="field"><label style="display:block;font-size:12.5px;font-weight:700;margin-bottom:5px">密碼</label><input id="del_pass" type="password"></div>
    <div class="err" id="delErr"></div>
    <div class="row">
      <button class="btn ghost" onclick="closeDelete()">取消</button>
      <button class="btn danger" onclick="performDelete()">確認刪除</button>
    </div>
  </div>
</div>

<script>
/* =====================================================
   設定：部署後把 Worker 網址填入 API_BASE 即切換為連線模式
   例如 const API_BASE = "https://daxin-api.你的帳號.workers.dev";
   留空字串 = Demo 模式（資料存在瀏覽器記憶體，重新整理會還原）
===================================================== */
const API_BASE = "";

/* ---------------- Demo 種子資料（與 schema.sql 一致） ---------------- */
const seed = {
clients: [
 {id:'c-shihchuan',company_name:'十全特好食品股份有限公司',brand_name:'十全',industry:'調味品・果醋',monthly_fee:20000,case_scale:'中案',data_completeness:85,timeline_status:'一般排程',tags:['1954','古法釀造','Clean Label','果醋'],color:'#C0392B'},

 {id:'c-yibiyaya',company_name:'十全特好食品股份有限公司',brand_name:'一比呀呀 YIBIYAYA',industry:'兒童天然果汁',monthly_fee:0,case_scale:'中案',data_completeness:78,timeline_status:'一般排程',tags:['親子','0添加糖','0色素','校園'],color:'#E9911C'}
],

  content_pillars:'百年工藝職人故事、食安認證與安心、料理提案食譜、果醋健康飲、節慶送禮。',

  regulation_notes:'禁用（涉療效）：治療、治癒、改善疾病、預防疾病、抗癌、降血壓、降血糖、降膽固醇、增強免疫力、改善過敏、解毒、消炎。禁用（誇大）：減肥、瘦身、塑身、燃脂、美白、抗老、回春。警戒詞：幫助消化、開胃、促進新陳代謝、調整體質。安全替代：天然釀造、無添加、輕負擔、料理應用、營養補給、健康好氣色、全家安心。',

async function submitForgot(){

  if(!live()) return $('#fg_msg').textContent = 'Demo 模式無後端；部署後此功能會通知管理員。';

async function submitAuth(){
  const err = $('#authErr'); err.textContent = '';
  if(!live()){ err.textContent = 'Demo 模式無後端，請以訪客瀏覽，或先完成部署。'; return; }
  const username = $('#au_user').value.trim(), password = $('#au_pass').value;
  try{
    if(authMode==='register'){
      const res = await fetch(API_BASE+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({email:$('#au_email').value.trim(),username,password,register_code:$('#au_code').value.trim()})});
      const data = await res.json();
      if(!res.ok){ err.textContent = data.error||'註冊失敗'; return; }
      toast('註冊成功，請直接登入'); authTab('login'); return;
    }
    const res = await fetch(API_BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username,password})});
    const data = await res.json();
    if(!res.ok){ err.textContent = data.error||'登入失敗'; return; }
    TOKEN = data.token;
    try{ localStorage.setItem('daxin_token', TOKEN); }catch(e){}
    state.me = {username:data.username, email:data.email, is_admin:!!data.is_admin};
    hideGate(); toast('歡迎回來，'+data.username+(data.is_admin?'（總管理員）':''));
    await apiLoad(); render();
  }catch(e){ err.textContent = '連線失敗：'+e.message; }
}
async function doLogout(){
  if(live() && TOKEN){ try{ await fetch(API_BASE+'/api/auth/logout',{method:'POST',headers:authHeaders()}); }catch(e){} }
  TOKEN = null; try{ localStorage.removeItem('daxin_token'); }catch(e){}
  showGate(); toast('已登出');
}

let pendingDelete = null;
function askDelete(type, id, label){
  pendingDelete = {type, id, label};
  $('#delDesc').innerHTML = `即將刪除：<b>${esc(label)}</b>${type==='client'?'<br><span style="color:var(--red)">⚠ 將連同該品牌的所有內容、戰役、品牌 DNA 一併刪除，無法復原。</span>':'<br>此動作無法復原。'}<br>請輸入你的帳號與密碼確認。`;
  $('#del_user').value=''; $('#del_pass').value=''; $('#delErr').textContent='';
  $('#delModal').classList.add('show');
}
function closeDelete(){ $('#delModal').classList.remove('show'); pendingDelete=null; }
async function performDelete(){
  if(!pendingDelete) return;
  const username = $('#del_user').value.trim(), password = $('#del_pass').value;
  const err = $('#delErr');
  if(!username || !password){ err.textContent='請輸入帳號與密碼'; return; }
  const {type, id, label} = pendingDelete;
  const paths = {content:'/api/content/', crm:'/api/crm/', campaign:'/api/campaigns/', client:'/api/clients/'};
  if(live()){
    try{
      const res = await fetch(API_BASE+paths[type]+id,{method:'DELETE',
        headers:{'Content-Type':'application/json',...authHeaders()},
        body:JSON.stringify({username,password})});
      const data = await res.json();
      if(!res.ok){ err.textContent = data.error||'刪除失敗'; return; }
    }catch(e){ err.textContent='連線失敗：'+e.message; return; }
  }
  // 本地資料同步移除
  const d = state.data;
  if(type==='content') d.content = d.content.filter(x=>x.id!==id);
  if(type==='crm') d.crm = d.crm.filter(x=>x.id!==id);
  if(type==='campaign') d.campaigns = d.campaigns.filter(x=>x.id!==id);
  if(type==='client'){
    d.content = d.content.filter(x=>x.client_id!==id);
    d.campaigns = d.campaigns.filter(x=>x.client_id!==id);
    delete d.profiles[id];
    d.clients = d.clients.filter(x=>x.id!==id);
    if(state.selClient===id) state.selClient = d.clients[0]?.id || null;
  }
  closeDelete(); toast('已刪除：'+label); render();
}

async function downloadBackup(){
  let dump;
  if(live()){
    try{
      const res = await fetch(API_BASE+'/api/backup',{headers:authHeaders()});
      if(res.status===401){ showGate(); return; }
      dump = await res.json();
    }catch(e){ return toast('備份失敗：'+e.message); }
  }else{
    dump = {exported_at:new Date().toISOString(), mode:'demo', ...state.data};
  }
  const blob = new Blob([JSON.stringify(dump,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'daxin-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); URL.revokeObjectURL(a.href);
  toast('備份已下載（含會員與全部營運資料）');
}

/* ---------------- API 抽象層：Demo / 連線兩用 ---------------- */
async function apiLoad(){
  if(!live()) return;
  try{
    const h = {headers:authHeaders()};
    const first = await fetch(API_BASE+'/api/clients', h);
    if(first.status===401){ showGate(); return; }
    try{ state.me = await fetch(API_BASE+'/api/auth/me', h).then(r=>r.json()); }catch(e){}
    const clients = await first.json();
    const [content, campaigns, crm] = await Promise.all([
      fetch(API_BASE+'/api/content', h).then(r=>r.json()),
      fetch(API_BASE+'/api/campaigns', h).then(r=>r.json()),
      fetch(API_BASE+'/api/crm', h).then(r=>r.json()),
    ]);
    const colors = ['#C0392B','#2A9D8F','#E9911C','#3d6b8e','#b0447a'];
    state.data.clients = clients.map((c,i)=>({...c, tags: typeof c.tags==='string'? JSON.parse(c.tags||'[]'):c.tags, color: colors[i%colors.length]}));
    state.data.content = content; state.data.campaigns = campaigns; state.data.crm = crm;
    state.data.profiles = {};
    for(const c of clients){
      state.data.profiles[c.id] = await fetch(API_BASE+'/api/profiles/'+c.id, h).then(r=>r.json());
    }
    if(!state.data.clients.find(c=>c.id===state.selClient)) state.selClient = state.data.clients[0]?.id || null;
  }catch(e){ toast('無法連線 Worker API，請檢查 API_BASE 設定'); }
}
async function apiPost(path, body){
  if(live()) return fetch(API_BASE+path,{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify(body)}).then(r=>r.json());
  return {id:'demo-'+Date.now().toString(36)};
}
async function apiPatch(path, body){
  if(live()) return fetch(API_BASE+path,{method:'PATCH',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify(body)}).then(r=>r.json());
  return {ok:true};
}
async function apiPut(path, body){
  if(live()) return fetch(API_BASE+path,{method:'PUT',headers:{'Content-Type':'application/json',...authHeaders()},body:JSON.stringify(body)}).then(r=>r.json());
  return {ok:true};
}

function taOptions(cid){
  const ta = (state.data.profiles[cid]?.target_audience||'').trim();
  const lines = ta.split('\n').map(s=>s.trim()).filter(s=>s.includes('｜'));
  if(lines.length) return lines.map(l=>`<option>${esc(l)}</option>`).join('');
  return `<option>${esc(ta||'主要 TA（請先到「訓練資料」設定目標客群）')}</option>`;
}
function refreshTA(){
  state.selClient = $('#g_client').value;
  $('#g_ta').innerHTML = taOptions(state.selClient);
}
async function generateArticle(){
  const cid = $('#g_client').value; const c = clientOf(cid); const p = state.data.profiles[cid]||{};
  const topic = $('#g_topic').value.trim() || '（依季度活動主軸發想）';
  const platform = $('#g_platform').value, goal = $('#g_goal').value;
  const out = $('#g_out'); const btn = $('#g_btn');
  out.classList.remove('empty'); out.textContent = 'AI 生成中，請稍候…'; btn.disabled = true;

  let text;
  if(live()){
    try{
      const res = await fetch(API_BASE+'/api/generate',{method:'POST',headers:{'Content-Type':'application/json',...authHeaders()},
        body:JSON.stringify({client_id:cid, platform, business_goal:goal,
          target_audience_line:$('#g_ta').value, structure:$('#g_structure').value,
          campaign_theme:$('#g_campaign').value, topic, extra_constraints:$('#g_extra').value,
          output_format:$('#g_format').value,
          use_data: $('#g_data').value==='all'?{ta:1,competitors:1,regulation:1,social:1}:$('#g_data').value==='ta'?{ta:1}:{} })});
      const data = await res.json();
      if(data.error){ out.textContent = '生成失敗：'+(data.detail?.error?.message||data.error); btn.disabled=false; return; }
      text = data.content;
      state.data.content.push({id:data.id,client_id:cid,title:topic,platform,status:'草稿中',content_body:text,business_goal:goal,scheduled_date:null,value_ntd:0,next_step:'完成初稿後送審'});
    }catch(e){ out.textContent='連線失敗：'+e.message; btn.disabled=false; return; }
  }else{
    await new Promise(r=>setTimeout(r,900));
    text = `【${c.brand_name||c.company_name}｜${platform}｜${goal}】\n主題：${topic}\n\n— 文章骨架（Demo 模擬）—\n1. Hook：痛點問句開場（依 TA「${$('#g_ta').value.split('｜')[1]||''}」設計）\n2. Problem：點出情境困擾\n3. Solution：以「${(p.content_pillars||'品牌內容支柱').split('、')[0]}」帶出產品差異\n4. 實用內容：食譜 / 用法 / 收藏點\n5. CTA：${goal==='轉換營收'?'限時導購連結':'留言互動鉤子'} + 3 hashtag\n\n— 法規檢核 —\n${p.regulation_notes?'已套用品牌法規護欄，禁用詞將自動迴避。':'⚠ 此品牌尚未設定法規護欄，請先到「訓練資料」補齊。'}\n\n※ 連上 Worker API 後，此處會由 Claude 依完整品牌 DNA 產出真實初稿。`;
    state.data.content.push({id:'ct-demo-'+Date.now().toString(36),client_id:cid,title:topic,platform,status:'草稿中',content_body:text,business_goal:goal,scheduled_date:null,value_ntd:0,next_step:'完成初稿後送審'});
  }
  out.textContent = text; btn.disabled = false;
  toast('初稿已產出並存入「內容排程」（狀態：草稿中）');
}

async function moveStatus(id, st){
  if(!st) return;
  const item = state.data.content.find(c=>c.id===id);
  item.status = st;
  if(st==='已發布' && !item.published_date) item.published_date = new Date().toISOString().slice(0,10);
  await apiPatch('/api/content/'+id, {status:st, published_date:item.published_date||null});
  toast(`「${item.title}」→ ${st}`);
  render();
}

function deletePicked(){
  const id = $('#ci_pick').value;
  const c = state.data.content.find(x=>x.id===id);
  if(c) askDelete('content', c.id, c.title);
}
function pickContent(){
  const id = $('#ci_pick').value;
  const c = state.data.content.find(x=>x.id===id);
  $('#ci_del').style.display = c ? 'inline-block' : 'none';
  if(!c){ $('#ci_title').value=''; $('#ci_date').value=''; $('#ci_next').value=''; return; }
  $('#ci_client').value = c.client_id; $('#ci_title').value = c.title;
  $('#ci_platform').value = c.platform; $('#ci_status').value = c.status;
  $('#ci_date').value = c.scheduled_date||''; $('#ci_value').value = c.value_ntd||0;
  $('#ci_next').value = c.next_step||'';
}
async function saveContent(){
  const id = $('#ci_pick').value;
  const title = $('#ci_title').value.trim();
  if(!title) return toast('請填寫標題');
  const body = {client_id:$('#ci_client').value, title, platform:$('#ci_platform').value,
    status:$('#ci_status').value, scheduled_date:$('#ci_date').value||null,
    value_ntd:+$('#ci_value').value||0, next_step:$('#ci_next').value};
  if(body.status==='已發布') body.published_date = body.scheduled_date || new Date().toISOString().slice(0,10);
  if(id){
    const item = state.data.content.find(x=>x.id===id);
    Object.assign(item, body);
    await apiPatch('/api/content/'+id, body);
    toast('已更新：'+title);
  }else{
    const res = await apiPost('/api/content', body);
    state.data.content.push({...body, id:res.id, content_body:'', business_goal:'', campaign_id:null});
    toast('已新增內容：'+title);
  }
  render();
}
function shiftMonth(delta){
  const [y,m] = state.calMonth.split('-').map(Number);
  const dt = new Date(y, m-1+delta, 1);
  state.calMonth = dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0');
  render();
}

  if(!user_id) return toast('請先從申請或會員列表點「重設密碼」選擇對象');

  if(live()){
    try{
      const res = await fetch(API_BASE+'/api/admin/reset-password',{method:'POST',
        headers:{'Content-Type':'application/json',...authHeaders()},
        body:JSON.stringify({user_id, new_password:pw})});
      const data = await res.json();
      if(!res.ok) return toast(data.error||'重設失敗');
    }catch(e){ return toast('連線失敗：'+e.message); }
  }
  state.admin.resets = (state.admin?.resets||[]).filter(r=>r.user_id!==user_id);
  state.adminMsg = `已重設「${username}」的密碼。請手動寄 Email 至 ${email} 通知使用者新密碼，並提醒對方登入後妥善保管。`;
  state.adminTarget = null;
  render();
}

/* ---------------- 渲染主控 ---------------- */
const PAGES = {overview:pageOverview, clients:pageClients, onboarding:pageOnboarding, training:pageTraining,
  generate:pageGenerate, campaign:pageCampaign, schedule:pageSchedule, revenue:pageRevenue, crm:pageCRM, admin:pageAdmin};

function render(){
  let r = ROUTES.find(x=>x.key===state.route) || ROUTES[0];
  if(r.adminOnly && !state.me?.is_admin){ r = ROUTES[0]; state.route = r.key; }
  if(r.key==='admin' && live() && !state.adminLoaded){
    state.adminLoaded = true;
    loadAdminData().then(()=>{ if(state.route==='admin') { $('#app').innerHTML = PAGES.admin(); } });
  }
  $('#tbNum').textContent = r.num; $('#tbTitle').textContent = r.title; $('#tbSub').textContent = r.sub;
  renderNav();
  $('#app').innerHTML = PAGES[r.key]();
}
window.addEventListener('hashchange', ()=>{ state.route = location.hash.slice(1)||'overview'; render(); });

(async function init(){
  state.route = location.hash.slice(1)||'overview';
  if(live()){
    if(!TOKEN){ showGate(); renderNav(); return; }
    await apiLoad();          // 若 token 過期，apiLoad 內會自動彈出登入
  }else{
    showGate();               // Demo 模式：顯示閘門並提供訪客入口
  }
  render();
})();
</script>
</body>
