<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大心整合行銷 — AI 行銷管理系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#17140f;          /* 側欄黑 */
  --ink-2:#24201a;
  --gold:#c9974a;         /* 主金 */
  --gold-deep:#a87830;
  --cream:#f7f1e3;        /* 卡片米 */
  --cream-2:#efe6d2;
  --paper:#fdfbf6;        /* 內容底 */
  --line:#e3d9c4;
  --text:#2b2620;
  --muted:#8a8072;
  --green:#3e7d5a; --green-bg:#dcebe0;
  --yellow:#a07816; --yellow-bg:#f5e8c4;
  --blue:#3d6b8e;  --blue-bg:#dbe7f0;
  --red:#b04a3a;   --red-bg:#f3ddd7;
  --pink:#b0447a;  --pink-bg:#f3dce8;
  --gray:#6b6b6b;  --gray-bg:#e7e4de;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--text);display:flex;min-height:100vh}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;width:100%;color:var(--text)}
textarea{resize:vertical;min-height:80px}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:1px}

/* ---------- 側欄 ---------- */
.sidebar{width:210px;background:var(--ink);color:#e9e2d4;flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{font-family:'Noto Serif TC',serif;font-size:21px;font-weight:900;padding:26px 22px 20px;letter-spacing:1px;border-bottom:1px solid #2f2a22}
.nav{flex:1;padding:14px 10px;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:10px;padding:11px 14px;color:#c9c0ae;text-decoration:none;font-size:14.5px;border-radius:8px;margin-bottom:2px}
.nav a .ic{width:16px;text-align:center;opacity:.7;font-size:12px}
.nav a:hover{background:#26221b;color:#fff}
.nav a.active{background:#2e2921;color:#fff;font-weight:700;box-shadow:inset 3px 0 0 var(--gold)}
.mode-tag{margin:12px;padding:8px 10px;font-size:11.5px;border-radius:8px;background:#26221b;color:#a89c85;line-height:1.5}
.mode-tag b{color:var(--gold)}

/* ---------- 主區 ---------- */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{background:var(--ink);color:#fff;display:flex;align-items:center;gap:14px;padding:14px 26px;border-bottom:3px solid var(--gold)}
.topbar .num{background:var(--gold);color:var(--ink);font-weight:900;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px}
.topbar h2{font-size:18px;font-weight:700}
.topbar .sub{margin-left:auto;font-size:13px;color:var(--gold);font-weight:500}
.content{padding:28px 30px;max-width:1180px}
.page-title{font-family:'Noto Serif TC',serif;font-size:34px;font-weight:900;margin-bottom:6px}
.page-desc{color:var(--muted);font-size:14px;margin-bottom:22px;line-height:1.6}

/* ---------- 統計卡 ---------- */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:14px;margin-bottom:22px}
.stat{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.stat .label{font-size:13px;color:var(--muted);margin-bottom:6px}
.stat .val{font-size:27px;font-weight:900}
.stat .note{font-size:12px;margin-top:4px}
.stat .bubble{position:absolute;right:-14px;bottom:-18px;width:64px;height:64px;border-radius:50%;opacity:.55}
.n-green{color:var(--green)} .n-red{color:var(--red)} .n-blue{color:var(--blue)} .n-gold{color:var(--gold-deep)}
.b-green{background:#bcd8c6} .b-cream{background:#e8d9b5} .b-red{background:#ecc4bb} .b-blue{background:#c3d5e4}

/* ---------- 面板 ---------- */
.panel{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-bottom:20px}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.panel-head h3{font-size:15.5px;font-weight:700}
.panel-head .hint{font-size:12.5px;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.field label{display:block;font-size:12.5px;font-weight:700;margin-bottom:5px}
.btn{background:var(--gold);color:var(--ink);border:none;border-radius:9px;padding:11px 20px;font-weight:700;font-size:14px}
.btn:hover{background:var(--gold-deep);color:#fff}
.btn.ghost{background:#fff;border:1px solid var(--line);color:var(--text)}
.btn.small{padding:6px 12px;font-size:12.5px}

/* ---------- 狀態籤 ---------- */
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap}
.st-草稿中{background:var(--red-bg);color:var(--red)}
.st-待補資料{background:var(--yellow-bg);color:var(--yellow)}
.st-待客戶審核{background:var(--blue-bg);color:var(--blue)}
.st-已發布{background:var(--green-bg);color:var(--green)}
.st-緊急處理{background:var(--pink-bg);color:var(--pink)}
.st-延後發布{background:var(--gray-bg);color:var(--gray)}
.tagline{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{background:var(--cream-2);border:1px solid var(--line);border-radius:14px;padding:2px 10px;font-size:11.5px}

/* ---------- 表格 ---------- */
table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;font-size:13.5px}
thead{background:var(--ink);color:#e9e2d4}
th{padding:10px 12px;text-align:left;font-size:12.5px;font-weight:500}
td{padding:11px 12px;border-bottom:1px solid #f0ead9;vertical-align:top}
td .sub{font-size:12px;color:var(--muted);margin-top:3px}

/* ---------- 品牌卡 ---------- */
.brand-card{background:#fff;border:2px solid transparent;border-radius:12px;padding:14px 16px;margin-bottom:12px;cursor:pointer}
.brand-card.sel{border-color:var(--green)}
.brand-card .row{display:flex;align-items:center;gap:10px}
.brand-card .avatar{width:32px;height:32px;border-radius:8px;color:#fff;font-weight:900;display:flex;align-items:center;justify-content:center}
.brand-card .pct{margin-left:auto;font-weight:900;font-size:14px}
.brand-card .bar{height:6px;border-radius:4px;background:#eee;margin-top:9px;overflow:hidden}
.brand-card .bar i{display:block;height:100%}
.info-card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px 16px}
.info-card h4{font-size:13.5px;margin-bottom:7px}
.info-card p{font-size:12.5px;color:#5a5347;line-height:1.7}

/* ---------- 看板 ---------- */
.kanban{display:grid;grid-template-columns:repeat(6,minmax(160px,1fr));gap:12px;overflow-x:auto}
.kcol{background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px}
.kcol h4{font-size:13px;display:flex;justify-content:space-between;margin-bottom:10px;padding:0 4px}
.kcard{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:9px;font-size:12.5px}
.kcard b{display:block;font-size:13px;margin-bottom:4px}
.kcard .meta{color:var(--muted);font-size:11.5px;line-height:1.5}
.kempty{border:1.5px dashed var(--line);border-radius:9px;padding:22px 0;text-align:center;color:var(--muted);font-size:12.5px}

/* ---------- 月曆 ---------- */
.cal-head{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.cal-head .mbtn{background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 14px;font-size:13px}
.cal-head .mbtn.on{background:var(--ink);color:#fff}
.legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:10px;overflow:hidden}
.cal-cell{background:#fff;min-height:96px;padding:6px;font-size:12px}
.cal-cell .d{font-weight:700;color:var(--muted);margin-bottom:4px}
.cal-ev{border-radius:7px;padding:5px 7px;margin-bottom:5px;font-size:11px;line-height:1.45;border-left:3px solid}
.ev-已發布{background:var(--green-bg);border-color:var(--green)}
.ev-待補資料{background:var(--yellow-bg);border-color:var(--yellow)}
.ev-待客戶審核{background:var(--blue-bg);border-color:var(--blue)}
.ev-草稿中{background:var(--red-bg);border-color:var(--red)}
.ev-緊急處理{background:var(--pink-bg);border-color:var(--pink)}
.ev-延後發布{background:var(--gray-bg);border-color:var(--gray)}

/* ---------- 產出結果 ---------- */
.gen-out{background:#fff;border:1px solid var(--line);border-radius:11px;padding:18px;min-height:340px;font-size:13.5px;line-height:1.85;white-space:pre-wrap}
.gen-out.empty{display:flex;align-items:center;justify-content:center;color:var(--muted);text-align:center}
.step-flow{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.step{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}
.step .no{background:var(--gold);color:var(--ink);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;margin-bottom:7px}
.step b{font-size:13px;display:block;margin-bottom:4px}
.step p{font-size:11.5px;color:var(--muted);line-height:1.5}
.toast{position:fixed;bottom:22px;right:22px;background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;box-shadow:0 6px 20px rgba(0,0,0,.25);opacity:0;transition:.3s;pointer-events:none;border-left:4px solid var(--gold)}
.toast.show{opacity:1}

@media (max-width:900px){
  .sidebar{width:64px}
  .brand{font-size:0;padding:20px 0;text-align:center}
  .brand::after{content:"大心";font-size:16px}
  .nav a span.txt{display:none}
  .mode-tag{display:none}
  .grid2,.grid3,.grid4,.step-flow{grid-template-columns:1fr}
  .kanban{grid-template-columns:repeat(2,1fr)}
  .content{padding:18px}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="brand">大心整合行銷</div>

  <div class="topbar">
    <div class="num" id="tbNum">1</div>
    <h2 id="tbTitle">總覽</h2>

  </div>

</div>

<div class="toast" id="toast"></div>

<script>

],

]
};

const STATUSES = ['草稿中','待補資料','待客戶審核','已發布','緊急處理','延後發布'];
const state = { data: JSON.parse(JSON.stringify(seed)), selClient:'c-shihchuan', calMonth:'2026-05', route:'overview' };
const live = () => API_BASE !== "";

/* ---------------- API 抽象層：Demo / 連線兩用 ---------------- */
async function apiLoad(){
  if(!live()) return;
  try{
    const [clients, content, campaigns, crm] = await Promise.all([
      fetch(API_BASE+'/api/clients').then(r=>r.json()),
      fetch(API_BASE+'/api/content').then(r=>r.json()),
      fetch(API_BASE+'/api/campaigns').then(r=>r.json()),
      fetch(API_BASE+'/api/crm').then(r=>r.json()),
    ]);
    const colors = ['#3e7d5a','#b04a3a','#3d6b8e','#a07816','#b0447a'];
    state.data.clients = clients.map((c,i)=>({...c, tags: typeof c.tags==='string'? JSON.parse(c.tags||'[]'):c.tags, color: colors[i%colors.length]}));
    state.data.content = content; state.data.campaigns = campaigns; state.data.crm = crm;
    state.data.profiles = {};
    for(const c of clients){
      state.data.profiles[c.id] = await fetch(API_BASE+'/api/profiles/'+c.id).then(r=>r.json());
    }
  }catch(e){ toast('無法連線 Worker API，請檢查 API_BASE 設定'); }
}
async function apiPost(path, body){
  if(live()) return fetch(API_BASE+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
  return {id:'demo-'+Date.now().toString(36)};
}
async function apiPatch(path, body){
  if(live()) return fetch(API_BASE+path,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
  return {ok:true};
}
async function apiPut(path, body){
  if(live()) return fetch(API_BASE+path,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
  return {ok:true};
}

/* ---------------- 工具 ---------------- */
const $ = s => document.querySelector(s);
const fmt = n => 'NT$' + Number(n||0).toLocaleString();
const esc = s => String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const clientOf = id => state.data.clients.find(c=>c.id===id) || {};
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
function chip(st){ return `<span class="chip st-${st}">${st}</span>`; }
function brandTag(id){ const c=clientOf(id); return `<span style="color:${c.color};font-weight:700">${esc(c.brand_name||c.company_name||'?')}</span>`; }

/* ---------------- 路由定義 ---------------- */

async function createClient(){
  const company = $('#ob_company').value.trim();
  if(!company) return toast('請先填寫客戶 / 公司名稱');
  const body = { company_name:company, brand_name:$('#ob_brand').value.trim(), industry:$('#ob_industry').value.trim(),
    monthly_fee:+$('#ob_fee').value||0, case_scale:$('#ob_scale').value, data_completeness:+$('#ob_complete').value,
    timeline_status:$('#ob_timeline').value, tags:[] };
  const res = await apiPost('/api/clients', body);
  const colors=['#3e7d5a','#b04a3a','#3d6b8e','#a07816','#b0447a'];
  state.data.clients.push({...body, id:res.id, color:colors[state.data.clients.length%colors.length]});
  state.data.profiles[res.id] = {positioning:'',target_audience:'',content_pillars:'',competitors:'',writing_restrictions:'',regulation_notes:'',platform_preferences:''};
  state.selClient = res.id;
  toast('已建立客戶：'+company+'，接著到「訓練資料」補齊品牌 DNA');
  location.hash = '#training';
}

async function generateArticle(){
  const cid = $('#g_client').value; const c = clientOf(cid); const p = state.data.profiles[cid]||{};
  const topic = $('#g_topic').value.trim() || '（依季度活動主軸發想）';
  const platform = $('#g_platform').value, goal = $('#g_goal').value;
  const out = $('#g_out'); const btn = $('#g_btn');
  out.classList.remove('empty'); out.textContent = 'AI 生成中，請稍候…'; btn.disabled = true;

  let text;
  if(live()){
    try{
      const res = await fetch(API_BASE+'/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({client_id:cid, platform, business_goal:goal,
          target_audience_line:$('#g_ta').value, structure:$('#g_structure').value,
          campaign_theme:$('#g_campaign').value, topic, extra_constraints:$('#g_extra').value,
          output_format:$('#g_format').value,
          use_data: $('#g_data').value==='all'?{ta:1,competitors:1,regulation:1,social:1}:$('#g_data').value==='ta'?{ta:1}:{} })});
      const data = await res.json();
      if(data.error){ out.textContent = '生成失敗：'+(data.detail?.error?.message||data.error); btn.disabled=false; return; }
      text = data.content;
      state.data.content.push({id:data.id,client_id:cid,title:topic,platform,status:'草稿中',content_body:text,business_goal:goal,scheduled_date:null,value_ntd:0,next_step:'完成初稿後送審'});
    }catch(e){ out.textContent='連線失敗：'+e.message; btn.disabled=false; return; }
  }else{
    await new Promise(r=>setTimeout(r,900));
    text = `【${c.brand_name||c.company_name}｜${platform}｜${goal}】\n主題：${topic}\n\n— 文章骨架（Demo 模擬）—\n1. Hook：痛點問句開場（依 TA「${$('#g_ta').value.split('｜')[1]||''}」設計）\n2. Problem：點出情境困擾\n3. Solution：以「${(p.content_pillars||'品牌內容支柱').split('、')[0]}」帶出產品差異\n4. 實用內容：食譜 / 用法 / 收藏點\n5. CTA：${goal==='轉換營收'?'限時導購連結':'留言互動鉤子'} + 3 hashtag\n\n— 法規檢核 —\n${p.regulation_notes?'已套用品牌法規護欄，禁用詞將自動迴避。':'⚠ 此品牌尚未設定法規護欄，請先到「訓練資料」補齊。'}\n\n※ 連上 Worker API 後，此處會由 Claude 依完整品牌 DNA 產出真實初稿。`;
    state.data.content.push({id:'ct-demo-'+Date.now().toString(36),client_id:cid,title:topic,platform,status:'草稿中',content_body:text,business_goal:goal,scheduled_date:null,value_ntd:0,next_step:'完成初稿後送審'});
  }
  out.textContent = text; btn.disabled = false;
  toast('初稿已產出並存入「內容排程」（狀態：草稿中）');
}

/* =====================================================
   模組 6：季度戰役（Kanban）
===================================================== */
function pageCampaign(){
  const d = state.data; const sel = state.selClient;
  const items = d.content.filter(c=>c.client_id===sel);
  const camp = d.campaigns.find(cp=>cp.client_id===sel);
  return `
  <h1 class="page-title">季度戰役</h1>
  <p class="page-desc">用三個月視角規劃預算、主題、活動節點與內容任務，支援小案、中案、大案。</p>
  <div class="panel"><div class="panel-head"><h3>季度戰役看板</h3>
    <span>${d.clients.map(c=>`<button class="btn small ${c.id===sel?'':'ghost'}" onclick="state.selClient='${c.id}';render()">${esc(c.brand_name||c.company_name)}</button>`).join(' ')}</span></div>
    ${camp?`<p style="font-size:13px;color:var(--muted);margin-bottom:14px">${esc(camp.quarter)}｜${esc(camp.theme)}｜預算 ${fmt(camp.budget)}</p>`:''}
    <div class="kanban">
      ${STATUSES.map(st=>{
        const list = items.filter(c=>c.status===st);
        return `<div class="kcol"><h4>${st}<span>${list.length}</span></h4>
          ${list.map(c=>`<div class="kcard"><b>${esc(c.title)}</b>
            <div class="meta">${esc(c.platform)} · ${c.scheduled_date||'未排程'}</div>
            <div style="margin-top:6px">${chip(c.status)}${c.business_goal?` <span class="chip" style="background:var(--cream-2)">${esc(c.business_goal)}</span>`:''}</div>
            <div style="margin-top:7px"><select onchange="moveStatus('${c.id}',this.value)" style="padding:4px 6px;font-size:11.5px">
              <option value="">狀態流轉…</option>${STATUSES.filter(s=>s!==st).map(s=>`<option>${s}</option>`).join('')}</select></div>
          </div>`).join('') || '<div class="kempty">空</div>'}
        </div>`;
      }).join('')}
    </div>
  </div>
  <div class="panel"><div class="panel-head"><h3>戰役內容庫</h3><span class="hint">從策略到平台文案</span></div>
    <table><thead><tr><th>週次</th><th>平台</th><th>主題</th><th>商業目的</th><th>狀態</th></tr></thead><tbody>
      ${items.map((c,i)=>`<tr><td>W${i+1}<div class="sub">${c.scheduled_date||''}</div></td><td><span class="chip" style="background:var(--blue-bg);color:var(--blue)">${esc(c.platform)}</span></td><td><b>${esc(c.title)}</b></td><td>${esc(c.business_goal)}</td><td>${chip(c.status)}</td></tr>`).join('')}
    </tbody></table>
  </div>`;
}
async function moveStatus(id, st){
  if(!st) return;
  const item = state.data.content.find(c=>c.id===id);
  item.status = st;
  if(st==='已發布' && !item.published_date) item.published_date = new Date().toISOString().slice(0,10);
  await apiPatch('/api/content/'+id, {status:st, published_date:item.published_date||null});
  toast(`「${item.title}」→ ${st}`);
  render();
}

/* =====================================================
   模組 7：內容排程（月曆）
===================================================== */
function pageSchedule(){
  const d = state.data;
  const months = ['2026-04','2026-05','2026-06'];
  const [y,m] = state.calMonth.split('-').map(Number);
  const first = new Date(y, m-1, 1); const days = new Date(y, m, 0).getDate();
  const startDow = first.getDay();
  const filterSt = state.schedSt||'', filterCl = state.schedCl||'';
  let cells = '';
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell"></div>`;
  for(let day=1;day<=days;day++){
    const ds = `${state.calMonth}-${String(day).padStart(2,'0')}`;
    const evs = d.content.filter(c=>c.scheduled_date===ds && (!filterSt||c.status===filterSt) && (!filterCl||c.client_id===filterCl));
    cells += `<div class="cal-cell"><div class="d">${day}</div>
      ${evs.map(c=>`<div class="cal-ev ev-${c.status}"><b>${esc(clientOf(c.client_id).brand_name||'')}</b><br>${esc(c.platform)} · ${esc(c.title)}<br><span style="opacity:.75">${c.status}</span></div>`).join('')}
    </div>`;
  }
  return `
  <h1 class="page-title">內容排程</h1>
  <p class="page-desc">把活動、平台和員工交付節奏排進日曆，快速找到草稿中、待補資料、待客戶審核、緊急處理和已發布內容。</p>
  <div class="panel">
    <div class="cal-head">
      <div class="field" style="width:180px"><label>狀態篩選</label><select onchange="state.schedSt=this.value;render()">
        <option value="">全部狀態</option>${STATUSES.map(s=>`<option ${filterSt===s?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="field" style="width:200px"><label>客戶篩選</label><select onchange="state.schedCl=this.value;render()">
        <option value="">全部客戶</option>${d.clients.map(c=>`<option value="${c.id}" ${filterCl===c.id?'selected':''}>${esc(c.company_name)}</option>`).join('')}</select></div>
      <div style="margin-left:auto;display:flex;gap:6px;align-items:flex-end">
        ${months.map(mm=>`<button class="mbtn ${state.calMonth===mm?'on':''}" onclick="state.calMonth='${mm}';render()">${+mm.split('-')[1]}月</button>`).join('')}
      </div>
    </div>
    <div class="legend">${STATUSES.map(s=>chip(s)).join(' ')}</div>
    <div class="calendar">
      ${['日','一','二','三','四','五','六'].map(w=>`<div class="cal-cell" style="min-height:auto;background:var(--cream-2);font-weight:700;text-align:center">${w}</div>`).join('')}
      ${cells}
    </div>
  </div>`;
}

/* =====================================================
   模組 8：收益與交付
===================================================== */
function pageRevenue(){
  const d = state.data;
  const done = d.content.filter(c=>c.status==='已發布');
  const stuck = d.content.filter(c=>['待補資料','待客戶審核','草稿中','緊急處理'].includes(c.status));
  const contract = d.clients.reduce((s,c)=>s+(c.monthly_fee||0)*3,0) + 96000;
  const avg = done.length? Math.round(done.reduce((s,c)=>s+(c.value_ntd||0),0)/done.length):0;
  return `
  <h1 class="page-title">收益與交付</h1>
  <p class="page-desc">把每一篇內容連到交付價值、狀態與下一步，讓老闆看得懂產能和收入。</p>
  <div class="stats">
    <div class="stat"><div class="label">完成交付</div><div class="val">${done.length}</div><div class="note n-green">已發布</div><div class="bubble b-green"></div></div>
    <div class="stat"><div class="label">本季合約值</div><div class="val">${fmt(contract)}</div><div class="note n-gold">依客戶月費估算</div><div class="bubble b-cream"></div></div>
    <div class="stat"><div class="label">每篇平均價值</div><div class="val">${fmt(avg)}</div><div class="note n-gold">用於內部產能管理</div><div class="bubble b-cream"></div></div>
    <div class="stat"><div class="label">卡關交付</div><div class="val">${stuck.length}</div><div class="note n-red">需補圖或審稿</div><div class="bubble b-red"></div></div>
  </div>
  <div class="panel"><div class="panel-head"><h3>交付流水帳</h3><span class="hint">老闆看收益，員工看下一步</span></div>
    <table><thead><tr><th>客戶</th><th>內容</th><th>平台</th><th>狀態</th><th>價值</th><th>下一步</th></tr></thead><tbody>
      ${d.content.map(c=>`<tr>
        <td>${brandTag(c.client_id)}</td>
        <td><b>${esc(c.title)}</b><div class="sub">${esc((c.content_body||'').slice(0,32))}</div></td>
        <td>${esc(c.platform)}</td><td>${chip(c.status)}</td><td>${fmt(c.value_ntd)}</td>
        <td style="font-size:12.5px">${esc(c.next_step)}</td></tr>`).join('')}
    </tbody></table>
  </div>`;
}

/* =====================================================
   模組 9：客戶總管理 CRM
===================================================== */
function pageCRM(){
  const d = state.data;
  const active = d.crm.filter(r=>!['已成交','流失'].includes(r.stage));
  const pipeline = d.crm.reduce((s,r)=>s+(r.deal_value||0),0);
  const monthTodo = d.crm.filter(r=>r.next_contact_date && r.next_contact_date.startsWith('2026-07')).length;
  return `
  <h1 class="page-title">客戶總管理</h1>
  <p class="page-desc">管理客戶聯絡人、商機階段、跟進狀態、下次聯繫與任務紀錄，讓內容交付接上客戶關係。</p>
  <div class="stats">
    <div class="stat"><div class="label">管理客戶數</div><div class="val">${d.crm.length}</div><div class="note n-green">含潛在與既有客戶</div><div class="bubble b-green"></div></div>
    <div class="stat"><div class="label">跟進中商機</div><div class="val">${active.length}</div><div class="note n-blue">需求確認到提案</div><div class="bubble b-blue"></div></div>
    <div class="stat"><div class="label">本月待辦</div><div class="val">${monthTodo}</div><div class="note n-gold">會議、催審、回報</div><div class="bubble b-cream"></div></div>
    <div class="stat"><div class="label">預估管線價值</div><div class="val">${fmt(pipeline)}</div><div class="note n-green">依商機金額估算</div><div class="bubble b-green"></div></div>
  </div>
  <div class="panel"><div class="panel-head"><h3>客戶總管理欄位</h3><span class="hint">建立客戶關係、需求、負責人與下次動作</span></div>
    <div class="grid4">
      <div class="field"><label>公司 / 客戶名稱</label><input id="cr_company" placeholder="例如：新客戶品牌有限公司"></div>
      <div class="field"><label>聯絡人</label><input id="cr_contact" placeholder="例如：王小姐"></div>
      <div class="field"><label>職稱</label><input id="cr_title" placeholder="例如：行銷經理、品牌窗口"></div>
      <div class="field"><label>聯絡方式</label><input id="cr_method" placeholder="例如：LINE / Email / Phone"></div>
    </div>
    <div class="grid4" style="margin-top:12px">
      <div class="field"><label>客戶階段</label><select id="cr_stage"><option>新名單</option><option>提案中</option><option>合約洽談</option><option>已成交</option><option>續約追蹤</option></select></div>
      <div class="field"><label>跟進狀態</label><select id="cr_follow"><option>待首次聯繫</option><option>已聯繫待回覆</option><option>會議排程中</option><option>提案準備中</option></select></div>
      <div class="field"><label>下次聯繫日期</label><input id="cr_date" type="date"></div>
      <div class="field"><label>商機金額</label><input id="cr_value" type="number" value="60000"></div>
    </div>
    <div class="grid3" style="margin-top:12px">
      <div class="field"><label>行銷需求</label><select id="cr_need"><option>SEO 文章</option><option>FB/IG 經營</option><option>廣告投放</option><option>整合行銷</option></select></div>
      <div class="field"><label>負責人</label><input id="cr_owner" placeholder="例如：業務 A / PM B"></div>
      <div class="field"><label>優先級</label><select id="cr_priority"><option>一般</option><option>高</option><option>低</option></select></div>
    </div>
    <div class="field" style="margin-top:12px"><label>需求與溝通紀錄</label><textarea id="cr_notes" placeholder="記錄客戶需求、預算限制、提案方向、會議重點與下一步。"></textarea></div>
    <div style="margin-top:14px"><button class="btn" onclick="createCRM()">新增客戶管理紀錄</button></div>
  </div>
  <div class="panel"><div class="panel-head"><h3>CRM 管線</h3><span class="hint">名單 → 提案 → 合約 → 續約</span></div>
    <table><thead><tr><th>公司</th><th>聯絡人</th><th>階段</th><th>下次聯繫</th><th>商機金額</th><th>負責人</th><th>備註</th></tr></thead><tbody>
      ${d.crm.map(r=>`<tr><td><b>${esc(r.company_name)}</b><div class="sub">${esc(r.marketing_need||'')}</div></td>
        <td>${esc(r.contact_name)}<div class="sub">${esc(r.contact_title||'')} · ${esc(r.contact_method||'')}</div></td>
        <td><span class="chip" style="background:var(--green-bg);color:var(--green)">${esc(r.stage)}</span><div class="sub">${esc(r.follow_up_status||'')}</div></td>
        <td>${r.next_contact_date||'—'}</td><td>${fmt(r.deal_value)}</td><td>${esc(r.owner||'')}</td>
        <td style="font-size:12.5px;max-width:220px">${esc(r.notes||'')}</td></tr>`).join('')}
    </tbody></table>
  </div>`;
}
async function createCRM(){
  const company = $('#cr_company').value.trim();
  if(!company) return toast('請先填寫公司 / 客戶名稱');
  const body = {company_name:company,contact_name:$('#cr_contact').value,contact_title:$('#cr_title').value,
    contact_method:$('#cr_method').value,stage:$('#cr_stage').value,follow_up_status:$('#cr_follow').value,
    next_contact_date:$('#cr_date').value||null,deal_value:+$('#cr_value').value||0,
    marketing_need:$('#cr_need').value,owner:$('#cr_owner').value,priority:$('#cr_priority').value,notes:$('#cr_notes').value};
  const res = await apiPost('/api/crm', body);
  state.data.crm.push({...body, id:res.id});
  toast('已新增 CRM 紀錄：'+company);
  render();
}

/* ---------------- 渲染主控 ---------------- */
const PAGES = {overview:pageOverview, clients:pageClients, onboarding:pageOnboarding, training:pageTraining,
  generate:pageGenerate, campaign:pageCampaign, schedule:pageSchedule, revenue:pageRevenue, crm:pageCRM};

function render(){
  const r = ROUTES.find(x=>x.key===state.route) || ROUTES[0];
  $('#tbNum').textContent = r.num; $('#tbTitle').textContent = r.title; $('#tbSub').textContent = r.sub;
  renderNav();
  $('#app').innerHTML = PAGES[r.key]();
}
window.addEventListener('hashchange', ()=>{ state.route = location.hash.slice(1)||'overview'; render(); });

(async function init(){
  await apiLoad();
  state.route = location.hash.slice(1)||'overview';
  render();
})();
</script>
</body>
</html>
